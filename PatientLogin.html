<!DOCTYPE html>
<html>
<head>
    <title>PatientLogin</title>
    <link rel="stylesheet" href="styles/Header.css">
    <link rel="stylesheet" href="styles/PatientLogin.css">
</head>
<body style="margin: 0;">
    <div class="menu">
        <div class="ProjectTitle"><h1>BLOOD DONATION MANAGEMENT SERVICE</h1></div> 
        <div class="Home">
            <a href="Home.html"><h1>Home</h1></a>
        </div>
        <div class="Patient">
            <a href="PatientLogin.html"><h1>Patient</h1></a>
        </div>
        <div class="Donor">
            <a href="DonorLogin.html"><h1>Donor</h1></a>
        </div>
        <div class="Admin">
            <a href="AdminLogin.html"><h1>Admin</h1></a>
        </div>
    </div>
    <div class="PatientLoginScreen">
        <div class="PatientLoginBox">
            <div class="PatientLoginText">PATIENT LOGIN</div>
            <div style="display: flex;">
                <p class="UsernameText">USERNAME</p>
                <input class="UsernameTextBox" placeholder="Username">
            </div>
            <div style="display: flex;">
                <p class="PasswordText">PASSWORD</p>
                <input type="password" class="PasswordTextBox" placeholder="Password">
            </div>
            <button class="LoginButton" type="submit">Login</button>
            <p class="PatientSignupText">Don't have an account? <a href="PatientSignup.html">Click here to register</a></p>
        </div>
    </div>
</body>
</html>
