<!DOCTYPE html>
<html>
<head>
    <title>Admin Signup</title>
    <link rel="stylesheet" href="styles/Header.css">
    <link rel="stylesheet" href="styles/AdminSignup.css">
</head>
<body style="margin: 0;">
    <div class="menu">
        <div class="ProjectTitle"><h1>BLOOD DONATION MANAGEMENT SERVICE</h1></div> 
        <div class="Home">
            <a href="Home.html"><h1>Home</h1></a>
        </div>
        <div class="Admin">
            <a href="PatientLogin.html"><h1>Patient</h1></a>
        </div>
        <div class="Donor">
            <a href="DonorLogin.html"><h1>Donor</h1></a>
        </div>
        <div class="Admin">
            <a href="AdminLogin.html"><h1>Admin</h1></a>
        </div>
    </div>
    <div class="AdminSignupScreen">
        <div class="AdminSignupBox">
            <div class="AdminSignupText">ADMIN SIGNUP</div>
            <div class="Content">
                <div class="Text">
                    <p style="margin-bottom: 50px;">FIRST NAME</p>
                    <p style="margin-bottom: 50px;">LAST NAME</p>
                    <p style="margin-bottom: 50px;">USERNAME</p>
                    <p style="margin-bottom: 50px;">PASSWORD</p>
                    <p style="margin-bottom: 50px;">AGE</p>
                    <p style="margin-bottom: 50px;">BLOOD GROUP</p>
                    <p style="margin-bottom: 50px;">DISEASE</p>
                    <p style="margin-bottom: 50px;">MOBILE NUMBER</p>
                </div>
                <div class="TextBox">
                    <input class="TextBoxes" placeholder="First Name" type="text">
                    <input class="TextBoxes" placeholder="Last Name" type="text">
                    <input class="TextBoxes" placeholder="Username" type="text">
                    <input class="TextBoxes" placeholder="Password" type="password">
                    <input class="TextBoxes" placeholder="Age" type="text">
                    <input class="TextBoxes" placeholder="Blood Group" type="text">
                    <input class="TextBoxes" placeholder="Disease" type="text">
                    <input class="TextBoxes" placeholder="Mobile Number" type="text">
                </div>
            </div>
            <button class="SignupButton" type="submit">Signup</button>
            <p class="AdminLoginText">Already have an account? <a href="AdminLogin.html">Click here to Login</a></p>
        </div>
    </div>
</body>
</html>
